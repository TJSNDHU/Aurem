<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" class="oroe-logo">
  <defs>
    <!-- Gold Shimmer Gradient -->
    <linearGradient id="goldShimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355">
        <animate attributeName="stop-color" values="#8B7355;#D4AF37;#F7E7A8;#D4AF37;#8B7355" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#D4AF37">
        <animate attributeName="stop-color" values="#D4AF37;#F7E7A8;#D4AF37;#8B7355;#D4AF37" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#F7E7A8">
        <animate attributeName="stop-color" values="#F7E7A8;#D4AF37;#8B7355;#D4AF37;#F7E7A8" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    
    <!-- Radial Gold Glow -->
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0"/>
    </radialGradient>
    
    <!-- Drop Shadow Filter -->
    <filter id="goldShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#D4AF37" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background Glow -->
  <circle cx="200" cy="200" r="180" fill="url(#goldGlow)"/>
  
  <!-- Octagon Frame -->
  <polygon 
    points="200,20 340,80 380,200 340,320 200,380 60,320 20,200 60,80" 
    fill="none" 
    stroke="url(#goldShimmer)" 
    stroke-width="2"
    filter="url(#goldShadow)"
  />
  
  <!-- Inner Octagon -->
  <polygon 
    points="200,50 310,100 340,200 310,300 200,350 90,300 60,200 90,100" 
    fill="none" 
    stroke="url(#goldShimmer)" 
    stroke-width="1"
    opacity="0.5"
  />
  
  <!-- DNA Helix Left Strand -->
  <path 
    d="M140,100 Q160,140 140,180 Q120,220 140,260 Q160,300 140,340" 
    fill="none" 
    stroke="url(#goldShimmer)" 
    stroke-width="3"
    stroke-linecap="round"
  />
  
  <!-- DNA Helix Right Strand -->
  <path 
    d="M260,100 Q240,140 260,180 Q280,220 260,260 Q240,300 260,340" 
    fill="none" 
    stroke="url(#goldShimmer)" 
    stroke-width="3"
    stroke-linecap="round"
  />
  
  <!-- DNA Connecting Bars -->
  <g stroke="url(#goldShimmer)" stroke-width="2" opacity="0.7">
    <line x1="145" y1="120" x2="255" y2="120"/>
    <line x1="135" y1="160" x2="265" y2="160"/>
    <line x1="140" y1="200" x2="260" y2="200"/>
    <line x1="135" y1="240" x2="265" y2="240"/>
    <line x1="145" y1="280" x2="255" y2="280"/>
    <line x1="150" y1="320" x2="250" y2="320"/>
  </g>
  
  <!-- Center Diamond Accent -->
  <polygon 
    points="200,185 215,200 200,215 185,200" 
    fill="url(#goldShimmer)"
    filter="url(#goldShadow)"
  >
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 200 200" 
      to="360 200 200" 
      dur="20s" 
      repeatCount="indefinite"
    />
  </polygon>
</svg>
