# ═══════════════════════════════════════════════════════════════════════════
# AUREM Auto-Deploy — Customer Repo Template (iter 326i)
# ═══════════════════════════════════════════════════════════════════════════
#
# WHO THIS IS FOR
# ───────────────
# This workflow is NOT for aurem.live itself. The aurem.live deploy is in
# `.github/workflows/hetzner-deploy.yml` and runs only on founder-initiated
# pushes to main.
#
# This file is the CANONICAL TEMPLATE that AUREM commits into the
# subscriber's GitHub repo. When AUREM's Repair Engine generates a fix:
#
#   1. `services/github_deploy_service.py::push_fix()` opens a PR titled
#      `[AUREM] <fix-title>` against the customer's repo on a branch named
#      `aurem/fix-<hex>`. The PR is labeled `aurem-autofix`.
#   2. The customer reviews. When they click MERGE on that PR, THIS
#      workflow fires (push to main with the merged branch).
#   3. This workflow runs: pytest → lint → optional smoke → deploy hook.
#   4. If anything fails, the workflow rolls back by reopening the merged
#      PR's revert branch and emails the customer.
#
# Triggers chosen so it NEVER runs on aurem.live's own main pushes:
#   • workflow_dispatch  — operator can trigger manually for testing
#   • push.paths-ignore  — ignores changes outside the customer's app
#                           directory (this lets AUREM-owned files in
#                           `.aurem/` not retrigger the workflow)
#   • pull_request → labeled with `aurem-autofix` — defensive: also fires
#                           on the PR itself so the customer sees CI
#                           green BEFORE clicking merge
#
# WHAT THE CUSTOMER NEEDS TO SET (repo secrets — Settings → Secrets → Actions)
# ────────────────────────────────────────────────────────────────────────────
#   AUREM_DEPLOY_TARGET    e.g. "vercel" | "render" | "fly" | "hetzner" | "custom"
#   AUREM_DEPLOY_HOOK_URL  Webhook the deploy provider listens on (Vercel/Render/Fly)
#   AUREM_NOTIFY_EMAIL     Customer email for deploy notifications
#   AUREM_API_KEY          Customer's AUREM API key (so this workflow can POST
#                          back deploy result to /api/customer/deploy/report)
# ═══════════════════════════════════════════════════════════════════════════
name: AUREM · Customer Auto-Deploy

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate only — do not call deploy hook"
        type: boolean
        default: false

  # Fires when AUREM's PR is merged into main (or whatever the customer's
  # production branch is named — they override via `AUREM_PROD_BRANCH` var).
  push:
    branches: [main, master]
    paths-ignore:
      - ".aurem/**"
      - "README.md"
      - "docs/**"

  # Defensive — also runs CI on the AUREM PR itself so the customer sees
  # green before merging. Only fires when the PR is labeled `aurem-autofix`.
  pull_request:
    types: [labeled, synchronize]

concurrency:
  group: aurem-auto-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # ─── Job 1: PR-time gate (no deploy, just CI green/red on AUREM's PR) ───
  pr_gate:
    name: PR-time CI (AUREM fix preview)
    if: github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'aurem-autofix')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: |
          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
          else
            echo "::warning::no backend/requirements.txt — skipping backend deps"
          fi

      - name: Run customer-side tests (if any)
        run: |
          if [ -d backend/tests ]; then
            pip install pytest
            pytest backend/tests -q --tb=short || exit 1
          else
            echo "::warning::no backend/tests/ — skipping pytest"
          fi

      - name: Comment "AUREM fix preview is green"
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "AUREM auto-fix CI is green. Safe to merge — production will auto-deploy."
            })

  # ─── Job 2: post-merge deploy (the actual rollout) ───
  deploy:
    name: Deploy merged AUREM fix to production
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Resolve deploy target
        id: target
        env:
          AUREM_DEPLOY_TARGET: ${{ secrets.AUREM_DEPLOY_TARGET }}
        run: |
          TARGET="${AUREM_DEPLOY_TARGET:-custom}"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "Selected deploy target: $TARGET"

      - name: Skip if dry_run requested
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "Dry run requested — exiting before deploy hook"
          exit 0

      - name: Fire deploy hook
        if: ${{ secrets.AUREM_DEPLOY_HOOK_URL != '' }}
        env:
          HOOK_URL: ${{ secrets.AUREM_DEPLOY_HOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          PAYLOAD=$(jq -n \
            --arg sha "$COMMIT_SHA" \
            --arg msg "$COMMIT_MSG" \
            --arg actor "aurem-auto-deploy" \
            '{commit: $sha, message: $msg, actor: $actor}')
          curl -sS -X POST "$HOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            -w "[deploy-hook HTTP %{http_code}]\n"

      - name: Report deploy back to AUREM control plane
        if: ${{ secrets.AUREM_API_KEY != '' && always() }}
        env:
          AUREM_API_KEY: ${{ secrets.AUREM_API_KEY }}
          COMMIT_SHA:    ${{ github.sha }}
          STATUS:        ${{ job.status }}
        run: |
          PAYLOAD=$(jq -n \
            --arg sha "$COMMIT_SHA" \
            --arg status "$STATUS" \
            --arg repo "${{ github.repository }}" \
            '{commit: $sha, status: $status, repo: $repo}')
          curl -sS -X POST "https://aurem.live/api/customer/deploy/report" \
            -H "Authorization: Bearer $AUREM_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            -w "[aurem-report HTTP %{http_code}]\n" || true

      - name: Notify customer email
        if: ${{ secrets.AUREM_NOTIFY_EMAIL != '' && always() }}
        env:
          NOTIFY:        ${{ secrets.AUREM_NOTIFY_EMAIL }}
          STATUS:        ${{ job.status }}
          SHA:           ${{ github.sha }}
        run: |
          echo "Would email $NOTIFY → status=$STATUS sha=$SHA"
          # Hook your customer-side email provider here. AUREM does NOT
          # email on the customer's behalf without their explicit secret.
