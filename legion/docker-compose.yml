version: "3.8"

services:
  ollama:
    image: ollama/ollama
    container_name: aurem-ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  chatterbox:
    image: bhimrazy/chatterbox-tts:v0.1.0
    container_name: aurem-voice
    ports:
      - "8001:8000"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: aurem-social
    ports:
      - "8000:5000"
    environment:
      - DATABASE_URL=postgresql://postiz:postiz@postiz-db:5432/postiz
      - REDIS_URL=redis://postiz-redis:6379
      - JWT_SECRET=aurem-postiz-secret-2024
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
      - BACKEND_INTERNAL_URL=http://localhost:3000
    depends_on:
      - postiz-db
      - postiz-redis
    restart: unless-stopped

  postiz-db:
    image: postgres:16-alpine
    container_name: aurem-postiz-db
    environment:
      - POSTGRES_USER=postiz
      - POSTGRES_PASSWORD=postiz
      - POSTGRES_DB=postiz
    volumes:
      - postiz_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  postiz-redis:
    image: redis:7-alpine
    container_name: aurem-postiz-redis
    restart: unless-stopped

  # iter 323i — AUREM main backend MongoDB (replaces Atlas)
  # iter 326m-stab — ulimits raised 1024→65536. Default Docker mongo image
  # ships with soft FD limit 1024 which mongod exhausts at ~40 client
  # connections (each backend service creates its own pool). Result
  # observed in preview: "Too many open files, errno: 24" → connection
  # close cascade → backend 502 → user-visible "blinking". Fix: raise
  # both soft + hard nofile to 65536. `somaxconn` raised to 4096 so the
  # listen backlog matches mongo's workload (default 128 silently drops
  # connections under load).
  aurem-mongodb:
    image: mongo:7
    container_name: aurem-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=aurem
      - MONGO_INITDB_ROOT_PASSWORD=${AUREM_MONGO_PASSWORD:-AuremMongo2026Strong!}
      - MONGO_INITDB_DATABASE=aurem_db
    volumes:
      - aurem_mongo_data:/data/db
    command: mongod --auth --bind_ip_all --wiredTigerCacheSizeGB 1
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    sysctls:
      net.core.somaxconn: 4096
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 5s
      retries: 5

  # iter 323i — AUREM main backend Redis (replaces Redis Cloud free tier)
  aurem-redis:
    image: redis:7-alpine
    container_name: aurem-main-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - aurem_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 5

  n8n:
    image: n8nio/n8n
    container_name: aurem-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=aurem
      - N8N_BASIC_AUTH_PASSWORD=AuremN8N2024
      - N8N_HOST=n8n.aurem.live
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.aurem.live/
      - GENERIC_TIMEZONE=America/Toronto
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

  # PentAGI — Autonomous AI Penetration Testing (Enterprise)
  # Shannon → PentAGI (AI brain) → Kali Linux (tools) → nmap, sqlmap, metasploit
  pentagi:
    image: vxcontrol/pentagi:latest
    container_name: aurem-pentagi
    ports:
      - "8443:8443"
    environment:
      - OPEN_AI_KEY=${EMERGENT_LLM_KEY}
      - OPEN_AI_SERVER_URL=https://api.openai.com/v1
      - PUBLIC_URL=https://pentagi.aurem.live
      - CORS_ORIGINS=https://pentagi.aurem.live,https://aurem.live
      - SERVER_PORT=8443
      - SERVER_HOST=0.0.0.0
      - SERVER_USE_SSL=false
      - PENTAGI_POSTGRES_USER=postgres
      - PENTAGI_POSTGRES_PASSWORD=aurem_pentagi_2026
      - PENTAGI_POSTGRES_DB=pentagidb
      - DOCKER_SOCKET=/var/run/docker.sock
      - DOCKER_INSIDE=true
      - DOCKER_DEFAULT_IMAGE_FOR_PENTEST=vxcontrol/kali-linux:latest
      - DUCKDUCKGO_ENABLED=true
      - SPLOITUS_ENABLED=true
      - SCRAPER_PRIVATE_URL=https://aurem:aurem_scraper_2026@pentagi-scraper/
      - LOCAL_SCRAPER_USERNAME=aurem
      - LOCAL_SCRAPER_PASSWORD=aurem_scraper_2026
    volumes:
      - pentagi_data:/opt/pentagi/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - pentagi-db
      - pentagi-scraper
    restart: unless-stopped

  # Kali Linux — Headless security tools container (used by PentAGI)
  # Contains: nmap, sqlmap, metasploit, nikto, dirb, gobuster, hydra, john, etc.
  kali:
    image: vxcontrol/kali-linux:latest
    container_name: aurem-kali
    command: ["sleep", "infinity"]
    restart: unless-stopped

  pentagi-db:
    image: vxcontrol/pgvector:latest
    container_name: aurem-pentagi-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=aurem_pentagi_2026
      - POSTGRES_DB=pentagidb
    volumes:
      - pentagi_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  pentagi-scraper:
    image: vxcontrol/scraper:latest
    container_name: aurem-pentagi-scraper
    environment:
      - AUTH_USER=aurem
      - AUTH_PASSWORD=aurem_scraper_2026
    restart: unless-stopped

volumes:
  ollama_data:
  postiz_db_data:
  n8n_data:
  pentagi_data:
  pentagi_db_data:
  aurem_mongo_data:
  aurem_redis_data:
