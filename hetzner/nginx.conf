# ════════════════════════════════════════════════════════════════════════
# AUREM — Nginx reverse proxy config for Hetzner production
# iter 323i
#
# Drop at: /etc/nginx/sites-available/aurem
# Symlink: ln -s /etc/nginx/sites-available/aurem /etc/nginx/sites-enabled/
# Then:    certbot --nginx -d aurem.live -d www.aurem.live
# ════════════════════════════════════════════════════════════════════════

# HTTP → HTTPS redirect (certbot will edit this block on first run)
server {
    listen 80;
    listen [::]:80;
    server_name aurem.live www.aurem.live;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aurem.live www.aurem.live;

    # SSL — certbot writes the actual cert paths here
    # ssl_certificate     /etc/letsencrypt/live/aurem.live/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/aurem.live/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── security headers ───────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 50M;

    # ── api → backend (FastAPI/uvicorn on 8001) ────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout    120s;
        proxy_connect_timeout 15s;
        proxy_buffering off;
    }

    # ── liveness probe (K8s-style, no auth) ────────────────────────────
    location = /health {
        proxy_pass http://127.0.0.1:8001/health;
        access_log off;
    }

    # ── frontend → React app on 3000 ───────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # ── gzip ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
}
