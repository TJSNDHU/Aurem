<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AUREM Lead Scraper</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div class="header">
      <div class="logo-row">
        <div class="logo-icon">A</div>
        <div>
          <div class="logo-text">AUREM</div>
          <div class="logo-sub">Lead Scraper</div>
        </div>
      </div>
      <div id="status-dot" class="status-dot"></div>
    </div>

    <!-- Connection Settings (collapsible) -->
    <div id="settings-panel" class="settings-panel hidden">
      <label>AUREM Dashboard URL</label>
      <input type="text" id="api-url" placeholder="https://your-aurem-instance.com" />
      <label>Auth Token</label>
      <input type="password" id="auth-token" placeholder="Paste your JWT token" />
      <button id="save-settings-btn" class="btn btn-gold">Save Connection</button>
      <div id="settings-msg" class="settings-msg"></div>
    </div>

    <!-- Page Info -->
    <div id="page-info" class="page-info">
      <div class="page-type-badge" id="page-type">Detecting...</div>
      <div class="page-url" id="page-url">—</div>
    </div>

    <!-- Action Buttons -->
    <div class="actions">
      <button id="scrape-btn" class="btn btn-gold btn-full">
        <span class="btn-icon">&#9889;</span> Scrape This Page
      </button>
    </div>

    <!-- Results -->
    <div id="results" class="results hidden">
      <div class="results-header">
        <span id="results-count">0 leads found</span>
        <div class="results-actions">
          <button id="copy-btn" class="btn btn-sm" title="Copy all">Copy</button>
          <button id="csv-btn" class="btn btn-sm" title="Export CSV">CSV</button>
          <button id="sync-btn" class="btn btn-sm btn-gold" title="Send to AUREM">Sync</button>
        </div>
      </div>
      <div id="leads-list" class="leads-list"></div>
    </div>

    <!-- Stored Leads Summary -->
    <div class="stored-bar">
      <span id="stored-count">0 leads stored locally</span>
      <button id="settings-toggle" class="btn btn-sm">Settings</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
