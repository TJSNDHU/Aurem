name: React Doctor

on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/react-doctor.yml'
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'

jobs:
  react-doctor:
    name: React Doctor Score Gate (>= 70)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run react-doctor and gate on score
        working-directory: frontend
        env:
          THRESHOLD: '70'
        run: |
          set -o pipefail
          # --score flag emits a single integer to stdout (rest goes to stderr).
          SCORE=$(npx -y react-doctor@latest . --score -y 2>/dev/null | tail -1 | tr -d '[:space:]')
          if ! [[ "$SCORE" =~ ^[0-9]+$ ]]; then
            echo "::error::Could not parse react-doctor score (got: '$SCORE')"
            echo "--- full diagnostics ---"
            npx -y react-doctor@latest . -y 2>&1 | tail -200
            exit 1
          fi
          echo "react-doctor score: $SCORE / 100 (threshold: $THRESHOLD)"
          if [ "$SCORE" -lt "$THRESHOLD" ]; then
            echo "::error::React Doctor score $SCORE is below the $THRESHOLD threshold."
            echo "--- top issues ---"
            npx -y react-doctor@latest . -y 2>&1 | tail -100
            exit 1
          fi
          echo "::notice::React Doctor score $SCORE passes the >= $THRESHOLD gate."
