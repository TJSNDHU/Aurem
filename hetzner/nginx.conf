# ════════════════════════════════════════════════════════════════════════
# AUREM — Nginx reverse proxy config for Hetzner production
# iter 323m — HTTP-only bootstrap; certbot --nginx auto-upgrades to HTTPS.
#
# Drop at:  /etc/nginx/sites-available/aurem
# Symlink:  ln -s /etc/nginx/sites-available/aurem /etc/nginx/sites-enabled/
# Test:     nginx -t                          (must pass — port-80 only)
# Reload:   systemctl reload nginx
# Then:     certbot --nginx -d aurem.live -d www.aurem.live
#
# certbot --nginx will, on first run:
#   1. Issue a Let's Encrypt cert via HTTP-01 (uses this port-80 server)
#   2. Auto-inject a `listen 443 ssl http2;` server block with the real
#      ssl_certificate paths
#   3. Modify this port-80 server to `return 301 https://$host$request_uri;`
# After that this file looks like the classic dual-block nginx config and
# `nginx -t` passes because real certs now exist.
# ════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    server_name aurem.live www.aurem.live;

    # ── security headers (also re-applied on the 443 block by certbot) ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 50M;

    # ── api → backend (FastAPI/uvicorn on 8001) ────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout    120s;
        proxy_connect_timeout 15s;
        proxy_buffering off;
    }

    # ── liveness probe (K8s-style, no auth) ────────────────────────────
    location = /health {
        proxy_pass http://127.0.0.1:8001/health;
        access_log off;
    }

    # ── frontend → React app on 3000 ───────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # ── gzip ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
}
