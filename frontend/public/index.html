<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    
    <!-- AUREM AI Platform Meta -->
    <title>AUREM | Autonomous AI Workforce Platform</title>
    <meta name="description" content="AUREM - Deploy your elite AI swarm. Four autonomous agents working in OODA synchronization to acquire, qualify, and close leads while you sleep. By Polaris Built." />
    <meta name="keywords" content="AUREM, AI agents, autonomous workforce, lead generation, AI sales, OODA loop, Polaris Built" />
    <meta name="author" content="Polaris Built Inc." />
    <meta name="robots" content="index, follow" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aurem.ai" />
    <meta property="og:title" content="AUREM | Autonomous AI Workforce" />
    <meta property="og:description" content="Deploy your elite AI swarm. Hunt. Qualify. Close. Autonomously." />
    <meta property="og:image" content="/og-image.png" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AUREM | Autonomous AI Workforce" />
    <meta name="twitter:description" content="Deploy your elite AI swarm. Hunt. Qualify. Close. Autonomously." />
    
    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://live-support-3.emergent.host" />
    <link rel="dns-prefetch" href="https://live-support-3.emergent.host" />
    
    <!-- Font Loading - Optimized for Performance -->
    <!-- Load only essential weights, defer with media -->
    <link 
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600&display=swap" 
      rel="stylesheet" 
      media="print" 
      onload="this.media='all'" 
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
    </noscript>
    
    <!-- Critical CSS -->
    <style>
        /* Critical CSS for fast first paint */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        html {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #050505;
            color: #F4F4F4;
            -webkit-font-smoothing: antialiased;
            scroll-behavior: smooth;
        }
        
        body {
            min-height: 100vh;
            background-color: #050505;
        }
        
        /* Loading Screen */
        #loading-splash {
            position: fixed;
            inset: 0;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #050505;
            transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
        }
        
        #loading-splash.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        
        .splash-logo {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 500;
            letter-spacing: 0.15em;
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.2s forwards;
        }
        
        .splash-logo span.gold {
            color: #D4AF37;
        }
        
        .splash-tagline {
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            color: rgba(244,244,244,0.5);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.4s forwards;
        }
        
        .splash-loader {
            width: 48px;
            height: 48px;
            position: relative;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.6s forwards;
        }
        
        .splash-loader::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 2px solid rgba(212,175,55,0.2);
            border-radius: 50%;
        }
        
        .splash-loader::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 2px solid transparent;
            border-top-color: #D4AF37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .splash-status {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: rgba(244,244,244,0.3);
            letter-spacing: 0.1em;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.8s forwards;
        }
        
        .splash-status span {
            color: #009874;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Prevent FOUC */
        #root:empty + #loading-splash { display: flex; }
        #root:not(:empty) ~ #loading-splash { display: none; }
    </style>
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "AUREM",
        "alternateName": "AUREM AI Workforce",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "description": "Autonomous AI Workforce platform with four specialized agents working in OODA synchronization for lead generation and sales automation.",
        "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
        },
        "creator": {
            "@type": "Organization",
            "name": "Polaris Built Inc.",
            "url": "https://polarisbuilt.com"
        }
    }
    </script>
</head>
<body>
    <noscript>You need to enable JavaScript to run AUREM.</noscript>
    
    <main id="root"></main>
    
    <!-- Loading Splash Screen -->
    <div id="loading-splash">
        <div class="splash-logo">
            <span class="gold">AUREM</span>
        </div>
        <div class="splash-tagline">Autonomous AI Workforce</div>
        <div class="splash-loader"></div>
        <div class="splash-status">
            <span>●</span> Initializing Vanguard
        </div>
    </div>
    
    <!-- Hide splash when React loads -->
    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                var splash = document.getElementById('loading-splash');
                if (splash) splash.classList.add('hidden');
            }, 500);
        });
    </script>
</body>
</html>
