name: AUREM Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    # FIX 1: MongoDB service container.
    # MONGODB_URL points to localhost:27017 but no MongoDB was running —
    # every DB-dependent test was failing with ServerSelectionTimeoutError.
    # GitHub-hosted runners are blank VMs; nothing is pre-installed.
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # FIX 2: Cache pip downloads so repeated runs don't re-fetch
          # all packages from scratch (~60-90s saved per run).
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt \
            --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/

      - name: Run tests
        run: python backend_test.py
        env:
          MONGODB_URL: mongodb://localhost:27017
          DB_NAME: aurem_test
          JWT_SECRET: test-secret-key