version: "3.9"

# React + FastAPI starter — AUREM CTO default stack.
# Generated from /app/aurem-cto/ reference compose.

services:
  api:
    build: ./api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      - mongo

  ui:
    build: ./ui
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - api

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

volumes:
  mongo_data:
