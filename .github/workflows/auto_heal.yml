name: Auto Heal
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          CODE=$(curl -s -o /dev/null \
            -w "%{http_code}" \
            https://aurem.live/health)
          echo "HEALTH=$CODE" >> $GITHUB_ENV

      - name: Trigger repair if unhealthy
        if: env.HEALTH != '200'
        run: |
          curl -X POST \
            https://aurem.live/api/admin/repair/run \
            -H "Authorization: Bearer ${{ secrets.ADMIN_TOKEN }}"
