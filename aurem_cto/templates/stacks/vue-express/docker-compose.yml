version: "3.9"

# Vue 3 (Vite) + Express API

services:
  ui:
    build: ./ui
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    build: ./api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
