<!DOCTYPE html>
<html lang="en-CA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReRoots - Offline Mode</title>
  <style>
    :root {
      --gold: #C9A86C;
      --gold-dark: #B8956A;
      --text-primary: #2D2A2E;
      --text-secondary: #666;
      --bg-gradient: linear-gradient(135deg, #FDF9F9 0%, #fff 100%);
      --pink-accent: #F8A5B8;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    
    .container {
      max-width: 420px;
      width: 100%;
    }
    
    /* Logo */
    .logo {
      width: 120px;
      height: auto;
      margin-bottom: 24px;
    }
    
    /* Offline icon */
    .offline-icon {
      width: 100px;
      height: 100px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, var(--pink-accent) 0%, var(--gold) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(201, 168, 108, 0.3);
    }
    
    .offline-icon svg {
      width: 50px;
      height: 50px;
      fill: white;
    }
    
    h1 {
      font-family: 'Playfair Display', serif;
      color: var(--text-primary);
      font-size: 28px;
      margin-bottom: 12px;
      font-weight: 600;
    }
    
    .subtitle {
      color: var(--gold-dark);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 20px;
      font-weight: 600;
    }
    
    p {
      color: var(--text-secondary);
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    
    /* Buttons */
    .btn-primary {
      display: inline-block;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
      color: white;
      padding: 16px 36px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: transform 0.2s, box-shadow 0.2s;
      border: none;
      cursor: pointer;
      margin-bottom: 16px;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(201, 168, 108, 0.4);
    }
    
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #25D366;
      color: white;
      padding: 14px 28px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .btn-secondary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(37, 211, 102, 0.4);
    }
    
    .btn-secondary svg {
      width: 20px;
      height: 20px;
      fill: white;
    }
    
    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: var(--text-secondary);
      font-size: 13px;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }
    
    .divider span {
      padding: 0 16px;
    }
    
    /* Status indicator */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 193, 7, 0.1);
      color: #d4a012;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      background: #ffc107;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Footer */
    .footer {
      margin-top: 40px;
      color: var(--text-secondary);
      font-size: 12px;
    }
    
    .footer a {
      color: var(--gold);
      text-decoration: none;
    }
    
    /* Cached products section */
    .cached-products {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #eee;
    }
    
    .cached-products h3 {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 16px;
      font-weight: 500;
    }
    
    #products-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    
    .product-card {
      background: white;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    
    .product-card img {
      width: 100%;
      height: 80px;
      object-fit: contain;
      margin-bottom: 8px;
    }
    
    .product-card h4 {
      font-size: 12px;
      color: var(--text-primary);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Logo -->
    <img src="/reroots-logo.jpg" alt="ReRoots" class="logo" onerror="this.style.display='none'">
    
    <!-- Status indicator -->
    <div class="status">
      <span class="status-dot"></span>
      Offline Mode
    </div>
    
    <!-- Offline icon -->
    <div class="offline-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M23.64 7c-.45-.34-4.93-4-11.64-4C5.28 3 .81 6.66.36 7L12 21.5 23.64 7zM3.53 8.44c1.07-.73 3.63-2.19 7.47-2.38L5.59 12.47l-2.06-4.03zm13.88.07l2.06 4.03-5.41 6.31c-3.84-.19-6.4-1.65-7.47-2.38l10.82-7.96z"/>
      </svg>
    </div>
    
    <h1>You're Offline</h1>
    <p class="subtitle">Your AURA-GEN advisor will return soon</p>
    
    <p>
      It looks like you're not connected to the internet. 
      Don't worry — your connection will be restored shortly.
    </p>
    
    <!-- Retry button -->
    <button class="btn-primary" onclick="window.location.reload()">
      Try Again
    </button>
    
    <div class="divider">
      <span>or get help now</span>
    </div>
    
    <!-- WhatsApp button -->
    <a href="https://wa.me/14168869408?text=Hi%2C%20I%20need%20help%20with%20my%20order" 
       class="btn-secondary" 
       target="_blank" 
       rel="noopener">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      WhatsApp Us
    </a>
    
    <!-- Cached products (populated by JS) -->
    <div class="cached-products" id="cached-section" style="display: none;">
      <h3>Browse Saved Products</h3>
      <div id="products-grid"></div>
    </div>
    
    <!-- Footer -->
    <div class="footer">
      <p>&copy; 2025 ReRoots Aesthetics Inc. | <a href="mailto:support@reroots.ca">support@reroots.ca</a></p>
    </div>
  </div>
  
  <script>
    // Try to show cached products
    async function loadCachedProducts() {
      try {
        const cache = await caches.open('reroots-api-v9');
        const response = await cache.match('/api/products');
        
        if (response) {
          const data = await response.json();
          const products = data.products || data;
          
          if (products && products.length > 0) {
            const grid = document.getElementById('products-grid');
            const section = document.getElementById('cached-section');
            
            // Show up to 4 products
            products.slice(0, 4).forEach(product => {
              const card = document.createElement('div');
              card.className = 'product-card';
              card.innerHTML = `
                <img src="${product.image || product.images?.[0] || '/logo.png'}" 
                     alt="${product.name}" 
                     onerror="this.src='/logo.png'">
                <h4>${product.name}</h4>
              `;
              grid.appendChild(card);
            });
            
            section.style.display = 'block';
          }
        }
      } catch (e) {
        console.log('No cached products available');
      }
    }
    
    // Check connection status
    function checkConnection() {
      if (navigator.onLine) {
        window.location.reload();
      }
    }
    
    // Listen for online event
    window.addEventListener('online', checkConnection);
    
    // Load cached products
    loadCachedProducts();
  </script>
</body>
</html>
