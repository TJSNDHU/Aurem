        <!-- Domain Canonicalization - Redirect all variants to https://reroots.ca -->
        <script>
            (function() {
                var host = window.location.hostname;
                var protocol = window.location.protocol;
                var path = window.location.pathname + window.location.search;
                
                // Skip redirects for localhost/development
                if (host === 'localhost' || host === '127.0.0.1' || host.indexOf('preview.emergentagent.com') !== -1) {
                    return;
                }
                
                // Force HTTPS (production only)
                if (protocol === 'http:' && host === 'reroots.ca') {
                    window.location.replace('https://reroots.ca' + path);
                    return;
                }
                
                // Force non-www (www.reroots.ca -> reroots.ca)
                if (host === 'www.reroots.ca') {
                    window.location.replace('https://reroots.ca' + path);
                    return;
                }
                
                // Redirect old Emergent deployment domains to production
                if (host.indexOf('emergent.host') !== -1) {
                    window.location.replace('https://reroots.ca' + path);
                    return;
                }
            })();
        </script>

        <!-- CSS Non-Blocking Strategy -->
        <!-- CRA injects CSS as render-blocking <link> tags. This script converts them to non-blocking -->
        <!-- by changing media to "print" and swapping to "all" on load -->
        <script>
            // Make all CRA-injected stylesheets non-render-blocking
            // This removes the 1,500ms+ CSS blocking delay
            (function() {
                // Run after DOMContentLoaded to catch CRA-injected styles
                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', makeStylesNonBlocking);
                } else {
                    // DOM already loaded, run immediately
                    setTimeout(makeStylesNonBlocking, 0);
                }
                
                function makeStylesNonBlocking() {
                    // Find all stylesheet links (except critical inline styles)
                    var links = document.querySelectorAll('link[rel="stylesheet"]');
                    links.forEach(function(link) {
                        // Skip if already processed or is an external CDN
                        if (link.dataset.nonblocking === 'true') return;
                        if (link.href.indexOf(window.location.origin) === -1) return;
                        
                        // Clone the link with non-blocking attributes
                        var newLink = link.cloneNode();
                        newLink.media = 'print';
                        newLink.onload = function() { 
                            this.media = 'all';
                            this.dataset.nonblocking = 'true';
                        };
                        
                        // Replace original with non-blocking version
                        link.parentNode.insertBefore(newLink, link.nextSibling);
                        link.remove();
                    });
                }
            })();
        </script>
