version: "3.9"

# Next.js (App Router) + Node API
# Single container — Next runs both the marketing pages AND the API
# routes at /api/*. MongoDB optional, included for parity.

services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
