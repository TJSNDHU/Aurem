<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C84B"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
  </defs>
  <!-- Premium dark background -->
  <rect width="32" height="32" rx="6" fill="#2D2A2E"/>
  <!-- Gold accent border -->
  <rect x="2" y="2" width="28" height="28" rx="4" fill="none" stroke="url(#goldGrad)" stroke-width="1"/>
  <!-- Stylized "RR" monogram for ReRoots -->
  <text x="16" y="22" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="16" 
        font-weight="bold" 
        fill="#F8A5B8" 
        text-anchor="middle"
        letter-spacing="-1">RR</text>
  <!-- Small botanical accent -->
  <circle cx="16" cy="7" r="2" fill="url(#goldGrad)"/>
</svg>
