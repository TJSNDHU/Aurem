# ════════════════════════════════════════════════════════════════════════
# AUREM — GitHub Actions auto-deploy to Hetzner
# iter 323i
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   HETZNER_HOST           e.g. 95.217.123.45 or aurem.live
#   HETZNER_USER           ubuntu / root
#   HETZNER_SSH_KEY        contents of ~/.ssh/id_ed25519 (private key)
#   HETZNER_PORT           22 (or custom)
#
# Triggers on push to main. Verifies deploy with /health curl.
# ════════════════════════════════════════════════════════════════════════
name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hetzner-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH → docker compose pull/up
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (metadata only)
        uses: actions/checkout@v4

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: ${{ secrets.HETZNER_PORT || 22 }}
          script_stop: true
          timeout: 600s
          script: |
            set -e
            cd /opt/aurem
            echo "▸ pulling latest main..."
            git fetch --all --prune
            git reset --hard origin/main
            echo "▸ docker compose build + up..."
            docker compose -f hetzner/docker-compose.yml --env-file backend/.env up -d --build --remove-orphans
            echo "▸ pruning dangling images..."
            docker image prune -f
            echo "▸ smoke test (wait 30s for boot)..."
            sleep 30
            for i in 1 2 3 4 5; do
              if curl -fsS http://localhost:8001/health >/dev/null; then
                echo "✓ deploy healthy"
                exit 0
              fi
              echo "  attempt $i/5 failed, retrying in 10s..."
              sleep 10
            done
            echo "✗ /health never came up — rolling back"
            docker compose -f hetzner/docker-compose.yml logs --tail 50 backend
            exit 1

      - name: External smoke test
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 10 https://aurem.live/api/health || echo "000")
            echo "external /api/health: $STATUS (attempt $i/5)"
            if [[ "$STATUS" == "200" ]]; then
              echo "✓ aurem.live is responding"
              exit 0
            fi
            sleep 15
          done
          echo "✗ external probe failed"
          exit 1
